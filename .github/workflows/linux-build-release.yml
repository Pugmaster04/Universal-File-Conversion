name: Linux Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - codex/linux-port
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv python3-pip python3-tk tk-dev dpkg-dev curl

      - name: Create build virtual environment
        run: |
          python3 -m venv .venv-linux-build

      - name: Build Linux artifacts
        shell: bash
        run: |
          source .venv-linux-build/bin/activate
          chmod +x build_linux.sh
          ./build_linux.sh

      - name: Smoke test Linux binaries
        shell: bash
        run: |
          chmod +x release_bins/UniversalConversionHub_UCH release_bins/UniversalConversionHub_UCH_Updater
          ./release_bins/UniversalConversionHub_UCH --version
          ./release_bins/UniversalConversionHub_UCH --smoke-test
          ./release_bins/UniversalConversionHub_UCH_Updater --version
          ./release_bins/UniversalConversionHub_UCH_Updater --smoke-test
          APPIMAGE_PACKAGE="$(ls release_bins/*.AppImage)"
          chmod +x "$APPIMAGE_PACKAGE"
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE_PACKAGE" --version
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE_PACKAGE" --smoke-test

      - name: Validate Debian package layout
        shell: bash
        run: |
          DEB_PACKAGE="$(ls release_bins/*.deb)"
          dpkg-deb --info "$DEB_PACKAGE"
          rm -rf deb-smoke
          mkdir -p deb-smoke
          dpkg-deb -x "$DEB_PACKAGE" deb-smoke
          test -x deb-smoke/usr/bin/universal-conversion-hub-uch
          test -x deb-smoke/usr/bin/universal-conversion-hub-uch-updater
          test -x deb-smoke/opt/universal-conversion-hub-uch/UniversalConversionHub_UCH
          test -x deb-smoke/opt/universal-conversion-hub-uch/UniversalConversionHub_UCH_Updater
          test -f deb-smoke/usr/share/applications/io.github.Pugmaster04.UniversalConversionHub.desktop
          test -f deb-smoke/usr/share/pixmaps/universal-conversion-hub-uch.png

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-build-artifacts
          if-no-files-found: error
          path: |
            release_bins/UniversalConversionHub_UCH
            release_bins/UniversalConversionHub_UCH_Updater
            release_bins/UniversalConversionHub_UCH_linux_*.tar.gz
            release_bins/*.deb
            release_bins/*.AppImage

      - name: Publish Linux release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Linux build artifact added by GitHub Actions."
          gh release upload "$TAG_NAME" release_bins/UniversalConversionHub_UCH_linux_*.tar.gz release_bins/*.deb release_bins/*.AppImage --clobber
